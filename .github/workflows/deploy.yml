name: Deploy

# Builds and publishes whatever's already committed — no API calls of its
# own. Data refreshes are two separate workflows (update-data.yml for
# football-data.org, update-live.yml for ESPN live scores) that commit +
# push, which triggers this via the `push` event. Keeping ingest out of the
# deploy path means a live-score-only push doesn't also re-run the slow,
# rate-limited football-data.org pass.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Queue rather than cancel: a cancelled run can leave a half-submitted Pages
# deployment that the next run collides with ("in progress deployment" 400).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
